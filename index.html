<!DOCTYPE html>
<html>
<head>
    <title>MedNova Tech</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #e0f7fa, #e8f5e9);
            text-align: center;
        }

        header {
            background: #0077b6;
            color: white;
            padding: 30px;
        }

        h1 {
            margin: 0;
        }

        .container {
            padding: 50px;
        }

        .btn {
            background: #00b4d8;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 12px;
            box-shadow: 0px 0px 10px #ccc;
        }

<body>

<header>
    <h1>MedNova Tech</h1>
    <p>Smart Medical Technology Solutions</p>
</header>

<div class="container">

    <div class="card">
        <h2>Welcome</h2>
        <p>We build modern healthcare technology systems.</p>
    </div>

    <button class="btn">Get Started</button>

</div>

</body>
</html>
