<!DOCTYPE html>
<html> 
<head>
    <title>Login - MedNova Tech</title>
</head>
<body style="text-align:center;font-family:Arial;">

<h2>Login</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey:"AIzaSyA1YF6bz8bvOO02_fQ2EwTvwipe3TT7PUc", 
    authDomain:"mednovatach.firebaseapp.com",
    projectId:"mednovatach",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
   .then((userCredential) => {
    window.location.href = "index.html";
})
.catch((error) => {
    document.getElementById("msg").innerText = error.message;
      });
  }

  window.login = login;
</script>

</body>
</html>
